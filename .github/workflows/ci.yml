name: API Regression CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v6

      - name: Checkout mall-tiny backend fork
        uses: actions/checkout@v6
        with:
          repository: dotyucun/mall-tiny
          path: sut/mall-tiny

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: sut/mall-tiny/pom.xml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build mall-tiny backend
        run: mvn -B -DskipTests package -f sut/mall-tiny/pom.xml

      - name: Prepare test configuration
        run: |
          cat > config/config.yaml <<'YAML'
          base_url: "http://localhost:8080"
          timeout: 10
          accounts:
            admin:
              username: "admin"
              password: "macro123"
            product_admin:
              username: "productAdmin"
              password: "123456"
            order_admin:
              username: "orderAdmin"
              password: "123456"
          mysql:
            host: "localhost"
            port: 3306
            user: "root"
            password: "root"
            database: "mall_tiny"
          YAML

      - name: Compile Python files
        run: python -m compileall -q common testcases conftest.py

      - name: Start test environment
        run: docker compose -f sut/mall-tiny/compose.test.yaml up -d --build

      - name: Wait for mall-tiny API
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/actuator/health | grep -q '"UP"'; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f sut/mall-tiny/compose.test.yaml logs --no-color
          exit 1

      - name: Run API regression tests
        run: pytest -q --alluredir=allure-results --clean-alluredir

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f sut/mall-tiny/compose.test.yaml logs --no-color

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Stop test environment
        if: always()
        run: docker compose -f sut/mall-tiny/compose.test.yaml down -v
