login_failed_cases:
  - case_name: "密码错误"
    username: "admin"
    password: "wrong_password"
    expected_code: 500
    expected_message: "密码不正确"

  - case_name: "用户名为空"
    username: ""
    password: "macro123"
    expected_code: 404
    expected_message: "username不能为空"

  - case_name: "密码为空"
    username: "admin"
    password: ""
    expected_code: 404
    expected_message: "password不能为空"

  - case_name: "用户不存在"
    username: "not_exist_user"
    password: "123456"
    expected_code: 404
    expected_message: "用户名或密码错误"
